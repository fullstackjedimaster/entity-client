services:
  entity-client:
    build:
      context: ../
      dockerfile: deploy/docker/entity-client/Dockerfile
      args:
        NEXT_PUBLIC_EC_API_BASE_URL: ${NEXT_PUBLIC_EC_API_BASE_URL:-/api}
        NEXT_PUBLIC_EC_DEFAULT_JWT: ${NEXT_PUBLIC_EC_DEFAULT_JWT:-}
    restart: unless-stopped

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3005"
      HOSTNAME: "0.0.0.0"
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://host.docker.internal:8003}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "127.0.0.1:3005:3005"

    init: true